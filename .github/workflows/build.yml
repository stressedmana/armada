---
name: Build container image
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths-ignore:
      - '**/README.md'
  workflow_dispatch:

env:
  IMAGE_DESC: "Armada: a gaming-focused, SteamOS-like Fedora bootc image for ARM64 handhelds"
  IMAGE_NAME: "${{ github.event.repository.name }}"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  # Every merge to main publishes the "testing" channel; beta/stable are made by
  # promoting (retagging) a testing build via promote.yml — no rebuild.
  DEFAULT_TAG: "testing"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}-${{ inputs.brand_name}}-${{ inputs.stream_name }}
  cancel-in-progress: true

jobs:
  build_push:
    name: Build and push image
    runs-on: ubuntu-24.04-arm

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e # v9
        with:
          remove-codeql: true

      - name: Prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      - name: Ensure container tools
        run: |
          set -euxo pipefail
          # ubuntu-24.04 dropped these from the runner image; the build action,
          # rechunk, and push all need them.
          need=""
          for t in buildah podman skopeo; do
            command -v "$t" >/dev/null || need="$need $t"
          done
          [ -z "$need" ] || { sudo apt-get update && sudo apt-get install -y $need; }

      - name: Require signing key before publishing a channel
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          if [ -z "${{ secrets.SIGNING_SECRET }}" ]; then
            echo "::error::SIGNING_SECRET is not set — refusing to publish an unsigned image (devices verify ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }})."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check build recipes
        uses: ublue-os/just-action@bda593098a84a84973b002b4377709166a68be52 # v2

      - name: Get current date
        id: date
        run: |
          echo "date=$(date -u +%Y\-%m\-%d\T%H\:%M\:%S\Z)" >> $GITHUB_OUTPUT

      - name: Image Metadata
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        id: metadata
        with:
          tags: |
            type=raw,value=${{ env.DEFAULT_TAG }}
            type=sha,enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=pr
          labels: |
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.documentation=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.licenses=GPL-2.0-or-later
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/blob/${{ github.sha }}/Containerfile
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.url=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/tree/${{ github.sha }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ env.DEFAULT_TAG }}.{{date 'YYYYMMDD' tz='America/New_York'}}
            containers.bootc=1
          sep-tags: " "
          sep-annotations: " "

      - name: Build Image
        id: build_image
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2
        with:
          containerfiles: |
            ./Containerfile
          image: ${{ env.IMAGE_NAME }}
          tags: raw
          labels: ${{ steps.metadata.outputs.labels }}
          oci: false

      - name: Rechunk for small OTA deltas
        id: rechunk
        run: |
          set -euxo pipefail
          # Ubuntu 24.04 blocks the unprivileged user namespaces rootless skopeo needs.
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          # build-chunked-oci runs rpm-ostree from inside the image against root
          # containers-storage, so bridge the rootless-built image over first.
          skopeo copy "containers-storage:localhost/${IMAGE_NAME}:raw" oci-archive:/tmp/raw.tar
          sudo skopeo copy oci-archive:/tmp/raw.tar containers-storage:localhost/raw-img
          # Free disk before the encapsulate; both are unused once raw-img exists.
          rm -f /tmp/raw.tar
          podman rmi "localhost/${IMAGE_NAME}:raw" 2>/dev/null || true
          sudo podman run --rm --privileged \
            --volume /var/lib/containers:/var/lib/containers \
            localhost/raw-img \
            rpm-ostree compose build-chunked-oci --bootc --max-layers 127 \
            --format-version 2 \
            --from localhost/raw-img --output containers-storage:localhost/chunked-img

      - name: Push to GHCR
        id: push
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          set -euxo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo skopeo login ghcr.io -u "${{ github.actor }}" --password-stdin
          IMAGE_FULL="${IMAGE_REGISTRY}/${IMAGE_NAME}"
          # One image, many tags → one digest, so one signature (below) covers all.
          # Retry so a transient ghcr 5xx can't leave a tag pushed but unsigned.
          push_tag() {
            local n=0
            until sudo skopeo copy \
                  containers-storage:localhost/chunked-img "docker://${IMAGE_FULL}:$1"; do
              n=$((n + 1)); [ "${n}" -ge 3 ] && return 1; sleep 15
            done
          }
          first=""
          for tag in ${{ steps.metadata.outputs.tags }}; do
            push_tag "${tag}"
            [ -n "${first}" ] || first="${tag}"
          done
          # skopeo --digestfile can't write under sudo's userns remap; read it back.
          digest=$(sudo skopeo inspect --format '{{.Digest}}' "docker://${IMAGE_FULL}:${first}")
          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && env.HAVE_SIGNING_SECRET == 'true'
        env:
          HAVE_SIGNING_SECRET: ${{ secrets.SIGNING_SECRET != '' }}
        with:
          cosign-release: 'v2.6.3'

      - name: Sign container image
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && env.HAVE_SIGNING_SECRET == 'true'
        run: |
          IMAGE_FULL="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}"
          # cosign runs rootless and has its own auth store — the push step's
          # `sudo skopeo login` only authenticated root, so log cosign in too.
          echo "${{ secrets.GITHUB_TOKEN }}" | cosign login ghcr.io -u "${{ github.actor }}" --password-stdin
          # Sign the digest, not a tag (a concurrent run could re-point the tag).
          # --new-bundle-format=false: bootc's verifier expects the legacy .sig; the
          # default flips in cosign v3.
          cosign sign -y --new-bundle-format=false --key env://COSIGN_PRIVATE_KEY "${IMAGE_FULL}@${{ steps.push.outputs.digest }}"
        env:
          HAVE_SIGNING_SECRET: ${{ secrets.SIGNING_SECRET != '' }}
          TAGS: ${{ steps.push.outputs.digest }}
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
